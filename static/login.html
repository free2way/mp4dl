<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>登录 - Video Downloader</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell auth-shell">
      <section class="workspace auth-workspace" aria-labelledby="login-title">
        <div class="intro auth-intro">
          <p class="eyebrow">Private Access</p>
          <h1 id="login-title">Video Downloader</h1>
          <p class="summary">登录后继续解析和下载视频到这台 Mac mini。</p>
        </div>

        <form id="login-form" class="login-form">
          <div class="options">
            <label for="username">用户名</label>
            <input id="username" name="username" type="text" autocomplete="username" required autofocus />
          </div>
          <div class="options">
            <label for="password">密码</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required />
          </div>
          <button id="login-submit" type="submit">登录</button>
          <p id="login-error" class="form-error hidden" role="alert"></p>
        </form>
      </section>
    </main>
    <script src="/login.js"></script>
  </body>
</html>
